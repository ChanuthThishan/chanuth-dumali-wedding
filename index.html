<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanuth & Dumali Wedding Invitation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
background:#000;
color:#fff;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1600');
background-size:cover;
background-position:center;
}

h1{
font-size:4rem;
color:gold;
margin-bottom:10px;
}

h2{
font-size:1.5rem;
margin-bottom:20px;
}

.details{
font-size:1.2rem;
line-height:2;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:gold;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:50px;
}

.section{
padding:60px 20px;
}

.countdown{
font-size:1.5rem;
color:gold;
margin-top:20px;
}

footer{
padding:30px;
border-top:1px solid #333;
}
  .hero{
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:20px;
border:2px solid gold;
border-radius:20px;
pointer-events:none;
}

h1{
font-size:4.5rem;
color:#FFD700;
text-shadow:0 0 15px rgba(255,215,0,.7);
animation:glow 3s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px rgba(255,215,0,.5);
}
to{
text-shadow:0 0 30px rgba(255,215,0,1);
}
}

.countdown{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:25px;
}

.countdown div{
background:rgba(255,215,0,.1);
border:1px solid gold;
padding:15px 20px;
border-radius:15px;
min-width:100px;
backdrop-filter:blur(5px);
}

.btn{
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 0 20px gold;
}

.section{
background:#111;
}

input,select,textarea{
background:#1a1a1a;
color:white;
border:1px solid gold;
}

button[type="submit"]{
cursor:pointer;
transition:.3s;
}

button[type="submit"]:hover{
box-shadow:0 0 20px gold;
transform:scale(1.05);
}
  #timer{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
margin-top:20px;
}

.time-box{
background:rgba(255,215,0,0.1);
border:1px solid gold;
padding:15px;
min-width:90px;
border-radius:15px;
color:gold;
font-weight:bold;
backdrop-filter:blur(5px);
}


</style>

</head>

<body>

<section class="hero">

<h2>Wedding Invitation</h2>

<h1>Chanuth ❤️ Dumali</h1>

<div class="details">
<p>📅 13 May 2027</p>
<p>⏰ 8:30 AM</p>
<p>📍 Deandra Hotel, Piliyandala</p>
  <div id="timer"></div>
</div>

<div class="countdown" id="countdown"></div>

<a class="btn"
target="_blank"
href="https://www.google.com/maps?sca_esv=bcc915fd4b92abab&output=search&q=deandra+hotel+piliyandala">
View Location </a>

</section>

<section class="section">

<h2 style="color:gold;">
Together with their families
</h2>

<p>
request the pleasure of your company
at the celebration of their marriage.
</p>

</section>
<section style="padding:60px 20px;max-width:700px;margin:auto;">

<h2 style="color:gold;margin-bottom:20px;">
RSVP
</h2>

<form id="rsvpForm">

<input
type="text"
id="name"
placeholder="Your Name"
required
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;">

<select
id="attendance"
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;">

<option value="accept">Accept with Pleasure</option>
<option value="decline">Regretfully Decline</option>

</select>

<input
type="number"
id="guestCount"
placeholder="Number of Guests"
value="1"
min="1"
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;">

<textarea
id="message"
placeholder="Leave a Message"
style="width:100%;padding:15px;margin:10px 0;border-radius:10px;">
</textarea>

<button
type="submit"
style="padding:15px 30px;background:gold;border:none;border-radius:50px;font-weight:bold;">
Submit RSVP
</button>

</form>

<div
id="successMessage"
style="margin-top:20px;color:gold;font-weight:bold;">
</div>

</section>
  
<footer>
<h2 style="color:gold;">Chanuth ❤️ Dumali</h2>
<p>We look forward to celebrating with you</p>
</footer>

<script>

const weddingDate =
new Date("May 13, 2027 08:30:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = weddingDate - now;

const days =
Math.floor(distance / (1000*60*60*24));

document.getElementById("countdown").innerHTML =
days + " Days Remaining";

},1000);

</script>
  
  <script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
