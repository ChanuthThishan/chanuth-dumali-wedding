<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chanuth & Dumali Wedding Invitation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Georgia, serif;
background:#000;
color:#fff;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1600');
background-size:cover;
background-position:center;
}

h1{
font-size:4rem;
color:gold;
margin-bottom:10px;
}

h2{
font-size:1.5rem;
margin-bottom:20px;
}

.details{
font-size:1.2rem;
line-height:2;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:gold;
color:#000;
text-decoration:none;
font-weight:bold;
border-radius:50px;
}

.section{
padding:60px 20px;
}

.countdown{
font-size:1.5rem;
color:gold;
margin-top:20px;
}

footer{
padding:30px;
border-top:1px solid #333;
}
</style>

</head>

<body>

<section class="hero">

<h2>Wedding Invitation</h2>

<h1>Chanuth ❤️ Dumali</h1>

<div class="details">
<p>📅 13 May 2027</p>
<p>⏰ 8:30 AM</p>
<p>📍 Deandra Hotel, Piliyandala</p>
</div>

<div class="countdown" id="countdown"></div>

<a class="btn"
target="_blank"
href="https://www.google.com/maps?sca_esv=bcc915fd4b92abab&output=search&q=deandra+hotel+piliyandala">
View Location </a>

</section>

<section class="section">

<h2 style="color:gold;">
Together with their families
</h2>

<p>
request the pleasure of your company
at the celebration of their marriage.
</p>

</section>

<footer>
<h2 style="color:gold;">Chanuth ❤️ Dumali</h2>
<p>We look forward to celebrating with you</p>
</footer>

<script>

const weddingDate =
new Date("May 13, 2027 08:30:00").getTime();

setInterval(function(){

const now = new Date().getTime();
const distance = weddingDate - now;

const days =
Math.floor(distance / (1000*60*60*24));

document.getElementById("countdown").innerHTML =
days + " Days Remaining";

},1000);

</script>

</body>
</html>
